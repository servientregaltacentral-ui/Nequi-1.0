<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Cobros</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-top: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #00c853;
  color: white;
  font-size: 16px;
  margin-top: 10px;
  cursor: pointer;
}

button:hover {
  background: #009624;
}

select, input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}
</style>

</head>

<body>

<div class="container">

<h1>💳 Central de Cobros</h1>

<div class="card">
  <label>Selecciona comercio:</label>
  <select id="comercio">
    <option value="ropa">Tienda Ropa</option>
    <option value="tecnologia">Tienda Tecnología</option>
    <option value="servicios">Servicios Digitales</option>
  </select>

  <label>Valor a cobrar:</label>
  <input type="number" id="monto" placeholder="Ej: 50000">

  <button onclick="pagar()">Generar pago</button>
</div>

<div class="card" id="resultado" style="display:none;">
  <h3>🔗 Link generado:</h3>
  <p id="link"></p>
  <button onclick="irPago()">Ir a pagar</button>
</div>

</div>

<script>

// 🔧 TU LINK DE WOMPI
const WOMPI_URL = "https://checkout.wompi.co/l/2KJR8m";

// 📦 Comercios
const comercios = {
  ropa: "Tienda Ropa",
  tecnologia: "Tienda Tecnología",
  servicios: "Servicios Digitales"
};

let ultimoLink = "";

// 🚀 Generar pago
function pagar() {

  const comercio = document.getElementById("comercio").value;
  const monto = document.getElementById("monto").value;

  if (!monto || monto <= 0) {
    alert("Ingresa un monto válido");
    return;
  }

  // 🔑 referencia única
  const referencia = comercio + "_" + Date.now();

  // 🔗 construir link
  const link = `${WOMPI_URL}?amount-in-cents=${monto*100}&reference=${referencia}`;

  ultimoLink = link;

  document.getElementById("resultado").style.display = "block";
  document.getElementById("link").innerText = link;
}

// 👉 Ir a pagar
function irPago() {
  window.location.href = ultimoLink;
}

</script>

</body>
</html>
